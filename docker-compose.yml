services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app/api
      - ./core:/app/core
      - ./credentials:/app/credentials
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    ports:
      - "8501:8501"
    volumes:
      - ./ui:/app/ui
      - ./core:/app/core
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - api
